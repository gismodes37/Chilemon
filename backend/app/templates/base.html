<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "ChileMon" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="{{ url_for('static', path='js/app.js') }}"></script>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="./">
          <span class="fw-bold">ChileMon</span>
          <span class="badge text-dark fw-light" style="background-color: #66A01B;">ASL3</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="./">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./nodes">Nodos</a></li>
            <li class="nav-item"><a class="nav-link" href="./settings">Ajustes</a></li>
          </ul>

          <div class="d-flex align-items-center gap-2">
            <button id="themeToggle" class="btn btn-outline-light btn-sm" type="button" title="Cambiar tema">
              🌓
            </button>
            <span class="navbar-text small text-secondary">ChileMon</span>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', path='js/app.js') }}"></script>

    <script>
      // Toggle tema (simple). Persistencia en localStorage.
      (function () {
        const key = "chilemon_theme";
        const btn = document.getElementById("themeToggle");
        const saved = localStorage.getItem(key);
        if (saved === "light") document.body.classList.add("theme-light");

        btn?.addEventListener("click", () => {
          document.body.classList.toggle("theme-light");
          localStorage.setItem(key, document.body.classList.contains("theme-light") ? "light" : "dark");
        });
      })();
    </script>
  </body>
</html>
