;; =============================================================================
;; Phone Mode — WebRTC Audio Bridge (rpt.conf)
;; =============================================================================
;; Agregar las siguientes líneas al bloque [NODE] correspondiente
;; en /etc/asterisk/rpt.conf, donde NODE es el número de nodo ASL local.
;;
;; Ejemplo para nodo 494780:
;;
;;   [494780]
;;   ; ... configuracion existente ...
;;   phonelogin=yes       ; <-- HABILITAR
;;   phonecontext=radio-ptt  ; Contexto de extensiones para llamadas entrantes IAX2
;;
;; Instalador: install/install_chilemon.sh (function configure_webrtc_asterisk)
;; =============================================================================
;;
;; phonelogin=yes permite que una extensión telefónica (IAX2/SIP) se conecte
;; al nodo y use DTMF para controlar PTT (*99 = key, # = unkey, *0 = monitor).
;;
;; phonecontext define el contexto en extensions.conf que recibe las llamadas
;; de las extensiones telefónicas. Debe coincidir con el context=radio-ptt
;; configurado en iax.conf para el peer [webrtc-bridge].
;;
;; extensions.conf requerido:
;;
;;   [radio-ptt]
;;   exten => NODE,1,rpt(NODE|P)
;;
;; Donde NODE es el número de nodo local.
