;; =============================================================================
;; IAX2 Phone Extension — WebRTC Audio Bridge
;; =============================================================================
;; Deploy this file to /etc/asterisk/iax.conf.d/webrtc-bridge.conf
;; or append the [webrtc-bridge] section to /etc/asterisk/iax.conf.
;;
;; Instalador: install/install_chilemon.sh (function configure_webrtc_asterisk)
;; Generado para ChileMon WebRTC Audio Bridge
;; =============================================================================
;;
;; IMPORTANTE: Cambiar 'CHANGEME_PHONE_SECRET' por una contraseña segura
;; antes de usar en producción. La misma debe coincidir con
;; config/local.php => iax_phone_pass y con el archivo de configuración
;; del puente Python (app/Services/WebRTCBridge/server.py).
;;

[webrtc-bridge]
type=friend
host=dynamic
context=radio-ptt
secret=CHANGEME_PHONE_SECRET

; --- Opciones de códec ---
; El puente WebRTC transcodifica OPUS 16kHz ↔ ulaw 8kHz.
; ulaw (g711u) es el códec nativo de app_rpt y evita
; transcodificación adicional en Asterisk.
disallow=all
allow=ulaw

; --- Opciones de conexión ---
; El bridge envía DTMF en banda (RFC 2833 no es necesario
; porque el protocolo IAX2 maneja DTMF como frame propio).
; deny/ permit solo para la IP del bridge si está en otra máquina.
qualify=yes
qualifyfreqok=60000

; --- Opciones de registro ---
; Tiempo máximo entre registros (segundos).
; El bridge renueva cada 30s por defecto.
maxms=0
requirecalltoken=no
