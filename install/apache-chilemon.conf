Alias /chilemon /opt/chilemon/public

<Directory /opt/chilemon/public>
    AllowOverride All
    Require all granted
</Directory>

# WebSocket proxy for WebRTC Audio Bridge (WSS → WS)
# Converts wss://host/chilemon/ws → ws://127.0.0.1:9091/ws
<Location /chilemon/ws>
    ProxyPass ws://127.0.0.1:9091/ws
    ProxyPassReverse ws://127.0.0.1:9091/ws
</Location>
